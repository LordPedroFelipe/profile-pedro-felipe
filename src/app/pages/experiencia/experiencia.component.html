<section class="section-shell observed-card page-hero">
  <span class="section-kicker">{{ 'EXPERIENCE_PAGE.KICKER' | translate }}</span>
  <h1 class="section-title">{{ 'EXPERIENCE_PAGE.TITLE' | translate }}</h1>
  <p class="section-subtitle">{{ 'EXPERIENCE_PAGE.SUBTITLE' | translate }}</p>
</section>

<section class="timeline observed-stagger">
  <article class="timeline-item observed-card" *ngFor="let job of experiences; let index = index">
    <div class="timeline-marker">
      <span>{{ index + 1 }}</span>
    </div>

    <div class="timeline-content section-shell">
      <div class="timeline-top">
        <div class="timeline-brand">
          <div class="brand-logo">
            <img [src]="'assets/img/' + job.LOGO" [alt]="job.COMPANY" loading="lazy" />
          </div>
          <div>
            <p class="timeline-date">{{ job.DATE }}</p>
            <h2>{{ job.TITLE }}</h2>
            <p class="timeline-company">{{ job.COMPANY }}</p>
          </div>
        </div>
      </div>

      <ul class="timeline-points">
        <li *ngFor="let item of job.DESCRIPTION">{{ item }}</li>
      </ul>
    </div>
  </article>
</section>
