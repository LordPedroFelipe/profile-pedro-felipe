<nav class="profile-nav glass-panel" [class.mobile-nav]="isMobile">
  <div class="brand-block">
    <div class="brand-avatar">
      <img src="assets/img/PedroFelipeDev.PNG" alt="Pedro Felipe" />
    </div>

    <div class="brand-copy">
      <p class="brand-eyebrow">Senior Profile</p>
      <h1>Pedro Felipe</h1>
      <p>{{ 'NAV.TAGLINE' | translate }}</p>
    </div>
  </div>

  <div class="nav-links" [class.mobile-links]="isMobile">
    <button
      *ngFor="let item of navItems"
      type="button"
      class="nav-link"
      [class.active]="isActive(item.route)"
      (click)="navigateTo(item.route)"
    >
      <mat-icon>{{ item.icon }}</mat-icon>
      <span>{{ item.labelKey | translate }}</span>
    </button>
  </div>
</nav>
